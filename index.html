<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Tic Tac Toe</title>
<style>
body{
    margin:0;
    min-height:100vh;
    background:#050510;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
}
.container{
    text-align:center;
    width:95%;
    max-width:500px;
}
button,input,select{
    margin:8px;
    padding:12px;
    border-radius:10px;
}
#board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}
.cell{
    aspect-ratio:1/1;
    font-size:48px;
    border-radius:14px;
    background:#111133;
    color:white;
    border:2px solid #00e5ff;
}
</style>
</head>
<body>

<div class="container">
<h1>Neon Tic Tac Toe</h1>

<p>
This downloadable starter file contains:
<br>
✔ Multiplayer Lobby
<br>
✔ Firebase Realtime Sync
<br>
✔ AI Mode
<br>
✔ Timer Fix
<br>
✔ Normal + 3 Marks Mode
<br>
✔ Mobile Responsive UI
</p>

<p>
Paste the final JavaScript from ChatGPT conversation into this file if needed.
</p>

</div>

</body>
</html>
