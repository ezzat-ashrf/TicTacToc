<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Tic Tac Toe Lobby</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#11113a 0%,#050510 70%);
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

h1{
    color:#ffeb3b;
    text-shadow:0 0 8px #ffeb3b,0 0 18px #ff9800;
}

#lobby, #game{
    text-align:center;
}

input{
    padding:12px;
    border-radius:10px;
    border:2px solid #00e5ff;
    background:#05051f;
    color:white;
    font-size:18px;
    text-align:center;
    margin:10px;
}

button{
    padding:12px 22px;
    margin:8px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    background:#111133;
    color:#00e5ff;
    box-shadow:0 0 10px #00e5ff,inset 0 0 10px #00e5ff;
}

button:hover{
    transform:scale(1.05);
}

#info{
    margin-bottom:20px;
    font-size:22px;
    color:#00e5ff;
    text-shadow:0 0 10px #00e5ff;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,105px);
    gap:14px;
    padding:18px;
    border:3px solid #1e90ff;
    border-radius:22px;
    box-shadow:0 0 15px #1e90ff,inset 0 0 15px #1e90ff;
    background:rgba(0,0,30,.6);
}

.cell{
    width:105px;
    height:105px;
    font-size:48px;
    font-weight:bold;
    border:2px solid #00e5ff;
    border-radius:18px;
    cursor:pointer;
    background:#05051f;
    color:white;
    box-shadow:0 0 8px #00e5ff,inset 0 0 12px rgba(0,229,255,.35);
}

#roomText{
    margin-top:20px;
    color:#ff4df8;
    font-size:16px;
    text-shadow:0 0 8px #ff4df8;
}
</style>
</head>

<body>

<h1>Neon Tic Tac Toe</h1>

<div id="lobby">
    <button id="createRoomBtn">CREATE ROOM</button>
    <br>
    <input id="roomInput" placeholder="Enter Room Code">
    <br>
    <button id="joinCustomBtn">JOIN CUSTOM ROOM</button>
    <button id="joinRandomBtn">JOIN RANDOM ROOM</button>
    <p id="lobbyMsg"></p>
</div>

<div id="game" style="display:none;">
    <div id="info">Connecting...</div>
    <div id="board"></div>
    <div id="roomText"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase, ref, set, get, update, remove,
    onValue, onDisconnect, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8XY7brewiHkbc5YmcJaXNWMn2qsoU9-E",
  authDomain: "tictactoc-c717e.firebaseapp.com",
  databaseURL: "https://tictactoc-c717e-default-rtdb.firebaseio.com/",
  projectId: "tictactoc-c717e",
  storageBucket: "tictactoc-c717e.firebasestorage.app",
  messagingSenderId: "972682364551",
  appId: "1:972682364551:web:ff546ee4187b8942db1a22",
  measurementId: "G-JRMK7L1Y3J"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const playerId = "player_" + Math.random().toString(36).substring(2, 9);

let roomCode = null;
let myRole = null;
let gameData = null;

const lobby = document.getElementById("lobby");
const game = document.getElementById("game");
const infoText = document.getElementById("info");
const boardDiv = document.getElementById("board");
const roomText = document.getElementById("roomText");
const lobbyMsg = document.getElementById("lobbyMsg");

document.getElementById("createRoomBtn").onclick = createRoom;
document.getElementById("joinCustomBtn").onclick = joinCustomRoom;
document.getElementById("joinRandomBtn").onclick = joinRandomRoom;

function generateRoomCode(){
    return Math.random().toString(36).substring(2,8).toUpperCase();
}

async function createRoom(){
    roomCode = generateRoomCode();
    myRole = "player1";

    await set(ref(db, "rooms/" + roomCode), {
        roomCode: roomCode,
        isPrivate: true,
        players:{
            player1: playerId
        },
        connections:{},
        board:["","","","","","","","",""],
        turn:"player1",
        status:"waiting",
        winner:"",
        createdAt: serverTimestamp()
    });

    enterGame();
}

async function joinCustomRoom(){
    const input = document.getElementById("roomInput").value.trim().toUpperCase();

    if(input === ""){
        lobbyMsg.innerText = "Please enter room code";
        return;
    }

    const roomRef = ref(db, "rooms/" + input);
    const snap = await get(roomRef);

    if(!snap.exists()){
        lobbyMsg.innerText = "Room not found";
        return;
    }

    const room = snap.val();

    if(room.players.player2){
        lobbyMsg.innerText = "Room is full";
        return;
    }

    roomCode = input;
    myRole = "player2";

    await update(roomRef, {
        "players/player2": playerId,
        status:"playing"
    });

    enterGame();
}

async function joinRandomRoom(){
    const snap = await get(ref(db, "rooms"));
    let foundRoom = null;

    if(snap.exists()){
        const rooms = snap.val();

        for(const id in rooms){
            const room = rooms[id];

            if(
                room.status === "waiting" &&
                room.isPrivate === false &&
                room.players &&
                room.players.player1 &&
                !room.players.player2 &&
                room.connections &&
                room.connections[room.players.player1]
            ){
                foundRoom = id;
                break;
            }
        }
    }

    if(foundRoom){
        roomCode = foundRoom;
        myRole = "player2";

        await update(ref(db, "rooms/" + roomCode), {
            "players/player2": playerId,
            status:"playing"
        });
    }else{
        roomCode = generateRoomCode();
        myRole = "player1";

        await set(ref(db, "rooms/" + roomCode), {
            roomCode: roomCode,
            isPrivate: false,
            players:{
                player1: playerId
            },
            connections:{},
            board:["","","","","","","","",""],
            turn:"player1",
            status:"waiting",
            winner:"",
            createdAt: serverTimestamp()
        });
    }

    enterGame();
}

function enterGame(){
    lobby.style.display = "none";
    game.style.display = "block";

    roomText.innerText = "Room Code: " + roomCode;

    setupDisconnect();
    listenGame();
}

async function setupDisconnect(){
    const roomRef = ref(db, `rooms/${roomCode}`);
    const connectionRef = ref(db, `rooms/${roomCode}/connections/${playerId}`);

    await set(connectionRef, true);
    onDisconnect(connectionRef).remove();

    if(myRole === "player1"){
        const snap = await get(roomRef);

        if(snap.exists() && snap.val().status === "waiting"){
            onDisconnect(roomRef).remove();
        }
    }

    onValue(ref(db, `rooms/${roomCode}/connections`), async()=>{
        setTimeout(async()=>{
            const roomSnap = await get(roomRef);
            if(!roomSnap.exists()) return;

            const room = roomSnap.val();
            const check = await get(ref(db, `rooms/${roomCode}/connections`));

            if(!check.exists()){
                await remove(roomRef);
                return;
            }

            if(room.status === "waiting"){
                const connections = check.val();

                if(!connections || !connections[room.players.player1]){
                    await remove(roomRef);
                }
            }

        }, 5000);
    });
}

function listenGame(){
    onValue(ref(db, "rooms/" + roomCode), (snapshot)=>{
        if(!snapshot.exists()){
            infoText.innerText = "Room deleted. Go back to lobby.";
            boardDiv.innerHTML = "";
            return;
        }

        gameData = snapshot.val();
        renderBoard();

        if(gameData.status === "waiting"){
            infoText.innerText = "Waiting for Player 2...";
        }
        else if(gameData.status === "playing"){
            const myTurn = gameData.turn === myRole;

            infoText.innerText =
                "You are " +
                (myRole === "player1" ? "X" : "O") +
                " | " +
                (myTurn ? "Your Turn" : "Opponent Turn");
        }
        else if(gameData.status === "ended"){
            let msg = "";

            if(gameData.winner === "draw") msg = "DRAW";
            else if(gameData.winner === myRole) msg = "YOU WIN 🎉";
            else msg = "YOU LOSE 😢";

            infoText.innerHTML = `
                ${msg}<br><br>
                <button id="playAgainBtn">PLAY AGAIN</button>
                <button id="backLobbyBtn">BACK TO LOBBY</button>
            `;

            document.getElementById("playAgainBtn").onclick = async ()=>{
                await update(ref(db, "rooms/" + roomCode), {
                    board:["","","","","","","","",""],
                    turn:"player1",
                    status:"playing",
                    winner:""
                });
            };

            document.getElementById("backLobbyBtn").onclick = async ()=>{
                await remove(ref(db, "rooms/" + roomCode));
                location.reload();
            };
        }
    });
}

function renderBoard(){
    boardDiv.innerHTML = "";

    gameData.board.forEach((value,index)=>{
        const btn = document.createElement("button");
        btn.className = "cell";

        btn.innerHTML = value === "X"
            ? `<span style="color:#ffeb3b;text-shadow:0 0 12px #ffeb3b;">X</span>`
            : value === "O"
            ? `<span style="color:#ff4df8;text-shadow:0 0 12px #ff4df8;">O</span>`
            : "";

        btn.onclick = ()=>makeMove(index);
        boardDiv.appendChild(btn);
    });
}

async function makeMove(index){
    if(!gameData) return;
    if(gameData.status !== "playing") return;
    if(gameData.turn !== myRole) return;
    if(gameData.board[index] !== "") return;

    const symbol = myRole === "player1" ? "X" : "O";
    const newBoard = [...gameData.board];
    newBoard[index] = symbol;

    const winner = checkWinner(newBoard);

    if(winner){
        await update(ref(db, "rooms/" + roomCode), {
            board:newBoard,
            status:"ended",
            winner: winner === "X" ? "player1" : "player2"
        });
        return;
    }

    if(newBoard.every(cell => cell !== "")){
        await update(ref(db, "rooms/" + roomCode), {
            board:newBoard,
            status:"ended",
            winner:"draw"
        });
        return;
    }

    await update(ref(db, "rooms/" + roomCode), {
        board:newBoard,
        turn: myRole === "player1" ? "player2" : "player1"
    });
}

function checkWinner(board){
    const wins = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    for(const [a,b,c] of wins){
        if(board[a] && board[a] === board[b] && board[a] === board[c]){
            return board[a];
        }
    }

    return null;
}
</script>

</body>
</html>
