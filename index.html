<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Online</title>

<style>
body{
    margin:0;
    padding:0;
    background: radial-gradient(circle at center, #11113a 0%, #050510 70%);
    color:#fff;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    overflow:hidden;
}

h1{
    color:#ffeb3b;
    text-shadow:
        0 0 8px #ffeb3b,
        0 0 18px #ff9800,
        0 0 35px #ff5722;
    font-size:42px;
    letter-spacing:2px;
}

#info{
    margin-bottom:20px;
    font-size:22px;
    color:#00e5ff;
    text-shadow:0 0 10px #00e5ff;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,105px);
    gap:14px;
    padding:18px;
    border:3px solid #1e90ff;
    border-radius:22px;
    box-shadow:
        0 0 15px #1e90ff,
        inset 0 0 15px #1e90ff;
    background:rgba(0,0,30,0.6);
}

.cell{
    width:105px;
    height:105px;
    font-size:48px;
    font-weight:bold;
    border:2px solid #00e5ff;
    border-radius:18px;
    cursor:pointer;
    background:#05051f;
    color:white;
    box-shadow:
        0 0 8px #00e5ff,
        inset 0 0 12px rgba(0,229,255,0.35);
    transition:0.2s;
}

.cell:hover{
    transform:scale(1.07);
    background:#10104a;
    box-shadow:
        0 0 18px #00e5ff,
        0 0 35px #2979ff,
        inset 0 0 18px #00e5ff;
}

.cell:contains("X"){
    color:#ffeb3b;
}

#roomText{
    margin-top:20px;
    color:#ff4df8;
    font-size:14px;
    text-shadow:0 0 8px #ff4df8;
}
</style>
</head>

<body>

<h1>Tic Tac Toe Online</h1>

<div id="info">Connecting...</div>

<div id="board"></div>

<div id="roomText"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    get,
    update,
    remove,
    push,
    onValue,
    onDisconnect,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



// ================= FIREBASE CONFIG =================

const firebaseConfig = {
  apiKey: "AIzaSyB8XY7brewiHkbc5YmcJaXNWMn2qsoU9-E",
  authDomain: "tictactoc-c717e.firebaseapp.com",
  databaseURL: "https://tictactoc-c717e-default-rtdb.firebaseio.com/",
  projectId: "tictactoc-c717e",
  storageBucket: "tictactoc-c717e.firebasestorage.app",
  messagingSenderId: "972682364551",
  appId: "1:972682364551:web:ff546ee4187b8942db1a22",
  measurementId: "G-JRMK7L1Y3J"
};

// ====================================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const infoText = document.getElementById("info");
const boardDiv = document.getElementById("board");
const roomText = document.getElementById("roomText");

const playerId = "player_" + Math.random().toString(36).substring(2, 9);

let roomId = null;
let myRole = null;
let gameData = null;



// ================= START =================

start();

async function start(){
    await joinOrCreateRoom();
    listenGame();
}



// ================= CREATE / JOIN ROOM =================

async function joinOrCreateRoom(){

    const gamesRef = ref(db, "games");
    const snapshot = await get(gamesRef);

    let foundRoom = null;

    if(snapshot.exists()){

        const games = snapshot.val();

        for(const id in games){

            const room = games[id];

            if(room.status === "waiting" && !room.players.player2){
                foundRoom = id;
                break;
            }
        }
    }

    // JOIN ROOM
    if(foundRoom){

        roomId = foundRoom;
        myRole = "player2";

        await update(ref(db, "games/" + roomId), {
            "players/player2": playerId,
            status: "playing"
        });

    }
    // CREATE ROOM
    else{

        const newRoom = push(ref(db, "games"));

        roomId = newRoom.key;
        myRole = "player1";

        await set(ref(db, "games/" + roomId), {

            players:{
                player1: playerId
            },

            connections:{},

            board:["","","","","","","","",""],

            turn:"player1",

            status:"waiting",

            winner:"",

            createdAt: serverTimestamp()
        });
    }

    roomText.innerText = "Room ID : " + roomId;

    setupDisconnect();
}



// ================= DISCONNECT SYSTEM =================

async function setupDisconnect(){

    const connectionRef = ref(db, `games/${roomId}/connections/${playerId}`);

    await set(connectionRef, true);

    onDisconnect(connectionRef).remove();

    onValue(ref(db, `games/${roomId}/connections`), async(snapshot)=>{

        setTimeout(async()=>{

            const check = await get(ref(db, `games/${roomId}/connections`));

            if(!check.exists()){

                await remove(ref(db, `games/${roomId}`));

                console.log("Room removed");
            }

        },5000);

    });
}



// ================= LISTEN GAME =================

function listenGame(){

    onValue(ref(db, "games/" + roomId), (snapshot)=>{

        if(!snapshot.exists()){

            infoText.innerText = "Room deleted. Refresh page.";

            boardDiv.innerHTML = "";

            return;
        }

        gameData = snapshot.val();

        renderBoard();

        if(gameData.status === "waiting"){

            infoText.innerText = "Waiting for Player 2...";

        }
        else if(gameData.status === "playing"){

            const myTurn = gameData.turn === myRole;

            infoText.innerText =
                "You are " +
                (myRole === "player1" ? "X" : "O") +
                " | " +
                (myTurn ? "Your Turn" : "Opponent Turn");
        }
        else if(gameData.status === "ended"){

            if(gameData.winner === "draw"){

                infoText.innerText = "DRAW";

            }else if(gameData.winner === myRole){

                infoText.innerText = "YOU WIN 🎉";

            }else{

                infoText.innerText = "YOU LOSE 😢";
            }

            setTimeout(async()=>{

                await remove(ref(db, "games/" + roomId));

            },5000);
        }

    });

}



// ================= RENDER BOARD =================

function renderBoard(){

    boardDiv.innerHTML = "";

    gameData.board.forEach((value,index)=>{

        const btn = document.createElement("button");

        btn.className = "cell";

        btn.innerText = value;

        btn.onclick = ()=>makeMove(index);

        boardDiv.appendChild(btn);
    });
}



// ================= MAKE MOVE =================

async function makeMove(index){

    if(gameData.status !== "playing") return;

    if(gameData.turn !== myRole) return;

    if(gameData.board[index] !== "") return;

    const symbol = myRole === "player1" ? "X" : "O";

    const newBoard = [...gameData.board];

    newBoard[index] = symbol;

    const winner = checkWinner(newBoard);

    // WIN
    if(winner){

        await update(ref(db, "games/" + roomId), {

            board:newBoard,

            status:"ended",

            winner: winner === "X" ? "player1" : "player2"
        });

        return;
    }

    // DRAW
    if(newBoard.every(cell => cell !== "")){

        await update(ref(db, "games/" + roomId), {

            board:newBoard,

            status:"ended",

            winner:"draw"
        });

        return;
    }

    // NEXT TURN
    await update(ref(db, "games/" + roomId), {

        board:newBoard,

        turn: myRole === "player1" ? "player2" : "player1"
    });

}



// ================= WIN CHECK =================

function checkWinner(board){

    const wins = [

        [0,1,2],
        [3,4,5],
        [6,7,8],

        [0,3,6],
        [1,4,7],
        [2,5,8],

        [0,4,8],
        [2,4,6]
    ];

    for(const combo of wins){

        const [a,b,c] = combo;

        if(
            board[a] &&
            board[a] === board[b] &&
            board[a] === board[c]
        ){
            return board[a];
        }
    }

    return null;
}

</script>

</body>
</html>
